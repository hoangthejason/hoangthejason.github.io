backend:
  name: git-gateway
  branch: main
  site_domain: meek-seahorse-ac6e3d.netlify.app

publish_mode: editorial_workflow
site_url: https://hoangthejason.github.io
display_url: https://hoangthejason.github.io
logo_url: /favicon.svg

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    format: "frontmatter"
    create: true
    extension: "mdx"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["machine-learning", "programming", "research", "personal"]
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Table of contents", name: "toc", widget: "boolean", default: true, required: false }
      - { label: "Comments", name: "comments", widget: "boolean", default: true, required: false }
      - { label: "Bibliography", name: "bibliography", widget: "string", required: false, hint: "Example: ../references/references.bib" }
      - { label: "CSL", name: "csl", widget: "string", required: false, hint: "Optional CSL style file path." }
      - { label: "Language", name: "lang", widget: "string", default: "en-US", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "courses"
    label: "Courses"
    folder: "src/content/courses"
    format: "frontmatter"
    create: true
    extension: "md"
    slug: "{{slug}}"
    summary: "{{course}} — {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Course", name: "course", widget: "string" }
      - label: "Kind"
        name: "kind"
        widget: "select"
        options: ["lecture-notes", "assignment", "summary"]
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "research"
    label: "Research"
    folder: "src/content/research"
    format: "frontmatter"
    create: true
    extension: "md"
    slug: "{{slug}}"
    summary: "{{topic}} — {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Topic", name: "topic", widget: "string" }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "papers"
    label: "Papers"
    folder: "src/content/papers"
    format: "frontmatter"
    create: true
    extension: "md"
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Authors", name: "authors", widget: "list", allow_add: true }
      - { label: "Paper Link", name: "paperLink", widget: "string" }
      - { label: "Problem", name: "problem", widget: "text" }
      - { label: "Method", name: "method", widget: "text" }
      - { label: "Results", name: "results", widget: "text" }
      - { label: "Limitations", name: "limitations", widget: "text" }
      - { label: "Notes", name: "notes", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "datasets"
    label: "Datasets"
    folder: "src/content/datasets"
    format: "frontmatter"
    create: true
    extension: "md"
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Size", name: "size", widget: "string" }
      - { label: "Tasks", name: "tasks", widget: "list", allow_add: true }
      - label: "Download Links"
        name: "downloadLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Notes", name: "notes", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Site Pages"
    files:
      - label: "Home"
        name: "home"
        file: "src/content/pages/home.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Intro", name: "intro", widget: "text", required: false }
          - { label: "Research Interests", name: "researchInterests", widget: "list", allow_add: true }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "About"
        name: "about"
        file: "src/content/pages/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Research Interests", name: "researchInterests", widget: "list", allow_add: true }
          - { label: "Skills", name: "skills", widget: "list", allow_add: true }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
